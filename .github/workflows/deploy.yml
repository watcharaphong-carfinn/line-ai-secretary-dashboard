name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: asia-southeast1
  SERVICE: line-ai-secretary-dashboard
  IMAGE: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/line-ai-secretary-dashboard/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Create Artifact Registry repo (ถ้ายังไม่มี)
        run: |
          gcloud artifacts repositories create line-ai-secretary-dashboard \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --quiet 2>/dev/null || true

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build & Push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --service-account=${{ secrets.GCP_DEPLOYER_SA }} \
            --set-env-vars=LINE_SECRETARY_URL=${{ secrets.LINE_SECRETARY_URL }},GOOGLE_CLIENT_ID=560617243929-hg397a61hl4v8kc0c8ds1dimkkils8v4.apps.googleusercontent.com,DASHBOARD_URL=https://internal.carfinn.com,SSO_COOKIE_DOMAIN=.carfinn.com,ALLOWED_DOMAIN=carfinn.com,AUTH_ENABLED=true,GMAIL_SENDER=noreply@carfinn.com \
            --set-secrets=DASHBOARD_API_KEY=DASHBOARD_API_KEY:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,AUTH_SECRET=AUTH_SECRET:latest,GCS_CLIENT_EMAIL=GCS_CLIENT_EMAIL:latest,GCS_PRIVATE_KEY=GCS_PRIVATE_KEY:latest,SSO_PRIVATE_KEY=SSO_PRIVATE_KEY:latest \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Show URL
        run: |
          echo "✅ Deployed:"
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)"
